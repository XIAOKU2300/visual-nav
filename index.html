<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炎之昊推拿理疗中心 | 前卫中医与美容的交汇</title>
    <style>
        /* CSS 变量与全局设置 */
        :root {
            --primary-color: #d4af37; /* 现代鎏金 */
            --bg-dark: #0f1115; /* 深邃黑底 */
            --bg-card: rgba(25, 28, 36, 0.7); /* 毛玻璃卡片底色 */
            --text-main: #f5f5f5;
            --text-muted: #a0aab2;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 导航栏设计：毛玻璃效果 */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(15, 17, 21, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: '';
            display: block;
            width: 12px;
            height: 12px;
            background: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary-color);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--primary-color);
        }

        .cart-icon {
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cart-count {
            background: var(--primary-color);
            color: var(--bg-dark);
            font-size: 12px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* 英雄区域 (Hero Section) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.1) 0%, transparent 60%);
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInDown 1s ease-out;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        .btn {
            padding: 15px 40px;
            font-size: 16px;
            color: var(--bg-dark);
            background: var(--primary-color);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4);
        }

        /* 商品/服务展示区 */
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin: 80px 0 40px;
            color: var(--primary-color);
        }

        .shop-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto 100px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: var(--transition);
        }

        .product-card:hover::before {
            left: 100%;
            transition: 0.8s;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .product-icon {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .product-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .product-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .product-price {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .btn-outline {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-outline:hover {
            background: var(--primary-color);
            color: var(--bg-dark);
        }

        /* 购物车侧边栏 */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: rgba(15, 17, 21, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(212, 175, 55, 0.2);
            z-index: 1001;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .close-cart {
            cursor: pointer;
            font-size: 24px;
            color: var(--text-muted);
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .cart-total {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            font-size: 1.5rem;
            text-align: right;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            border: none;
            border-radius: 10px;
            color: var(--bg-dark);
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* 预约弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1002;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--primary-color);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 10px;
            outline: none;
        }

        /* 动画 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 底部 */
        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">炎之昊</div>
        <nav>
            <ul>
                <li><a href="#home">首页</a></li>
                <li><a href="#services">理疗与美容</a></li>
                <li><a href="#about">关于中心</a></li>
            </ul>
        </nav>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 购物车 <span class="cart-count" id="cart-count">0</span>
        </div>
    </header>

    <section class="hero" id="home">
        <h1>重塑平衡 · 焕然新生</h1>
        <p>炎之昊推拿理疗中心，将古老中医经络学说与前卫科技美容完美融合。为您提供独一无二的深度疗愈与肌肤焕活体验。</p>
        <button class="btn" onclick="openBooking()">立即预约专属理疗</button>
    </section>

    <h2 class="section-title" id="services">精选项目与选购</h2>
    <div class="shop-container" id="product-list">
        </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>您的选购</h3>
            <span class="close-cart" onclick="toggleCart()">×</span>
        </div>
        <div class="cart-items" id="cart-items">
            </div>
        <div class="cart-total" id="cart-total">
            总计: ¥ 0
        </div>
        <button class="checkout-btn" onclick="checkout()">前往结算</button>
    </div>

    <div class="modal" id="booking-modal">
        <div class="modal-content">
            <h2 style="color: var(--primary-color); margin-bottom: 20px;">预约理疗师</h2>
            <input type="text" placeholder="您的姓名" id="name">
            <input type="tel" placeholder="联系电话" id="phone">
            <select id="service-type">
                <option value="tuina">中医经络推拿</option>
                <option value="beauty">深层细胞焕活美容</option>
                <option value="moxa">古法炎之艾灸</option>
            </select>
            <input type="date" id="date">
            <button class="btn" onclick="submitBooking()" style="width: 100%;">确认预约</button>
            <p style="margin-top: 15px; color: #a0aab2; cursor: pointer;" onclick="closeBooking()">取消</p>
        </div>
    </div>

    <footer id="about">
        <p>© 2026 炎之昊推拿理疗中心 Yan Zhi Hao Center. All Rights Reserved.</p>
        <p style="margin-top: 10px;">地址: 科技与自然交汇的大道 88 号</p>
    </footer>

    <script>
        // 模拟商品数据库
        const products = [
            { id: 1, icon: '💆‍♂️', title: '炎之昊定制推拿', desc: '深度舒缓肌肉筋膜，结合中医经络穴位，释放现代生活压力。', price: 398 },
            { id: 2, icon: '✨', title: '量子光子美容护理', desc: '前卫光电技术结合传统草本精华，直达肌底，唤醒细胞活力。', price: 880 },
            { id: 3, icon: '🔥', title: '古法九宫艾灸', desc: '采用陈年蕲艾，温通经脉，驱寒除湿，调节内分泌平衡。', price: 258 },
            { id: 4, icon: '🌿', title: '草本精油疗愈套装', desc: '中心特调理疗精油，居家亦可享受专业级芳香疗愈，促进睡眠。', price: 450 },
            { id: 5, icon: '🧘‍♀️', title: '骨盆正位理疗', desc: '针对久坐人群，专业手法矫正体态，改善腰酸背痛。', price: 580 },
            { id: 6, icon: '💎', title: '极光水光抗衰疗程', desc: '无创前卫导入技术，让肌肤喝饱水分，呈现嘭弹透亮质感。', price: 1280 }
        ];

        let cart = [];

        // 渲染商品列表
        function renderProducts() {
            const container = document.getElementById('product-list');
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-icon">${product.icon}</div>
                    <h3 class="product-title">${product.title}</h3>
                    <p class="product-desc">${product.desc}</p>
                    <div class="product-price">¥ ${product.price}</div>
                    <button class="btn-outline" onclick="addToCart(${product.id})">加入购物车</button>
                `;
                container.appendChild(card);
            });
        }

        // 购物车逻辑
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
            
            // 简单提示动画
            alert(`已将【${product.title}】加入购物车！`);
        }

        function updateCartUI() {
            // 更新角标
            document.getElementById('cart-count').innerText = cart.length;
            
            // 更新购物车列表
            const cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <span style="color: white;">${item.title}</span>
                    <span style="color: var(--primary-color);">¥${item.price}</span>
                    <span style="cursor: pointer; color: #ff4d4f;" onclick="removeFromCart(${index})">删除</span>
                `;
                cartItems.appendChild(div);
            });

            // 更新总价
            document.getElementById('cart-total').innerText = `总计: ¥ ${total}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('active');
        }

        function checkout() {
            if(cart.length === 0) {
                alert("您的购物车为空，请先选购商品或服务！");
                return;
            }
            alert("正在跳转至安全支付网关... (由于是演示原型，此功能模拟成功结算)");
            cart = [];
            updateCartUI();
            toggleCart();
        }

        // 预约逻辑
        function openBooking() {
            document.getElementById('booking-modal').style.display = 'flex';
        }

        function closeBooking() {
            document.getElementById('booking-modal').style.display = 'none';
        }

        function submitBooking() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            if(!name || !phone) {
                alert("请填写完整的预约信息！");
                return;
            }
            alert(`感谢您，${name}！您的预约已提交。我们的理疗师将很快与您联系。`);
            closeBooking();
        }

        // 页面加载完成时执行
        window.onload = () => {
            renderProducts();
        };
    </script>
</body>
</html>
