<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>主人你好~欢迎访问范の导航页</title>
  <!-- SVG favicon: cute pink flower -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%23130025'/%3E%3Ccircle cx='32' cy='20' r='8' fill='%23ff85c0' opacity='.9'/%3E%3Ccircle cx='44' cy='27' r='8' fill='%23c8a8ff' opacity='.9'/%3E%3Ccircle cx='44' cy='41' r='8' fill='%23ff6b9d' opacity='.9'/%3E%3Ccircle cx='32' cy='48' r='8' fill='%23c8a8ff' opacity='.9'/%3E%3Ccircle cx='20' cy='41' r='8' fill='%23ff85c0' opacity='.9'/%3E%3Ccircle cx='20' cy='27' r='8' fill='%23ff6b9d' opacity='.9'/%3E%3Ccircle cx='32' cy='32' r='9' fill='%23f0c860'/%3E%3C/svg%3E"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #ff6b9d;
      --pink2:  #ff85c0;
      --purple: #c8a8ff;
      --gold:   #f0c860;
      --bg:     #080010;
      --bg2:    #0d0020;
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    /* =========================================
       INTRO SCREEN
    ========================================= */
    #intro {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px;
    }
    #intro.done {
      animation: introExit 1.2s cubic-bezier(0.76,0,0.24,1) forwards;
    }
    @keyframes introExit {
      0%   { clip-path: polygon(0 0,100% 0,100% 100%,0 100%); opacity:1; }
      100% { clip-path: polygon(50% 0,50% 0,50% 100%,50% 100%); opacity:0; pointer-events:none; }
    }

    /* rotating ring */
    .intro-ring {
      position: relative; width: 120px; height: 120px;
    }
    .intro-ring svg {
      position: absolute; inset: 0;
      animation: spin 2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .intro-ring svg.rev {
      animation: spin 3s linear infinite reverse; opacity: .5;
    }
    .intro-logo {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      animation: logoPulse 1.5s ease-in-out infinite alternate;
    }
    @keyframes logoPulse {
      from { filter: drop-shadow(0 0 8px var(--pink)); }
      to   { filter: drop-shadow(0 0 24px var(--purple)); }
    }

    /* title */
    .intro-title {
      font-size: 22px; font-weight: 300; letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--pink2), var(--purple), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      opacity: 0;
      animation: fadeSlideUp .8s ease .4s forwards;
    }
    .intro-sub {
      font-size: 11px; letter-spacing: 5px; color: rgba(255,255,255,.35);
      opacity: 0;
      animation: fadeSlideUp .8s ease .7s forwards;
    }
    @keyframes fadeSlideUp {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* progress bar */
    .intro-bar-wrap {
      width: 220px; height: 2px;
      background: rgba(255,255,255,.1);
      border-radius: 2px; overflow: hidden;
      opacity: 0;
      animation: fadeSlideUp .8s ease .9s forwards;
    }
    .intro-bar {
      height: 100%; width: 0;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border-radius: 2px;
      transition: width .05s linear;
      box-shadow: 0 0 12px var(--pink);
    }
    .intro-pct {
      font-size: 10px; letter-spacing: 3px; color: var(--purple);
      opacity: 0;
      animation: fadeSlideUp .8s ease 1s forwards;
    }

    /* =========================================
       BACKGROUND CANVAS + BLOBS
    ========================================= */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .blob {
      position: fixed; border-radius:50%; filter: blur(130px);
      pointer-events:none; z-index:0;
    }
    .blob.b1 { width:700px;height:700px;background:radial-gradient(circle,#ff6b9d22,transparent 70%);top:-150px;left:-180px; }
    .blob.b2 { width:600px;height:600px;background:radial-gradient(circle,#c8a8ff1a,transparent 70%);bottom:-100px;right:-120px; }
    .blob.b3 { width:400px;height:400px;background:radial-gradient(circle,#f0c86016,transparent 70%);top:40%;left:40%; }

    /* =========================================
       MAIN PAGE
    ========================================= */
    #main {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 48px; padding: 24px;
      opacity: 0;
    }
    #main.visible {
      animation: mainIn 1s cubic-bezier(0.22,1,0.36,1) .1s forwards;
    }
    @keyframes mainIn {
      from { opacity:0; transform: scale(.96); }
      to   { opacity:1; transform: scale(1); }
    }

    /* ── HEADER ── */
    .header {
      text-align:center;
      transform: translateY(-30px); opacity:0;
    }
    #main.visible .header {
      animation: fadeSlideUp .9s cubic-bezier(0.22,1,0.36,1) .3s forwards;
    }
    .header .eyebrow {
      font-size:11px; letter-spacing:6px; text-transform:uppercase;
      color: var(--pink); margin-bottom:14px;
    }
    .header h1 {
      font-size: clamp(2rem,5.5vw,4rem);
      font-weight:200; letter-spacing:.08em;
      background: linear-gradient(135deg, #fff 20%, var(--pink2) 50%, var(--purple) 80%, var(--gold) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      line-height:1.1;
    }
    .header-line {
      height:1px; width:0; margin:16px auto 0;
      background: linear-gradient(90deg, transparent, var(--pink), var(--purple), transparent);
      box-shadow: 0 0 8px var(--pink);
    }
    #main.visible .header-line {
      animation: lineGrow 1.2s ease .9s forwards;
    }
    @keyframes lineGrow { to { width: 280px; } }

    /* ── CARDS ── */
    .cards {
      display:grid; grid-template-columns:2.2fr 1fr;
      gap:18px; width:100%; max-width:960px;
      transform: translateY(40px); opacity:0;
    }
    #main.visible .cards {
      animation: fadeSlideUp 1s cubic-bezier(0.22,1,0.36,1) .55s forwards;
    }

    .card {
      position:relative; border-radius:22px; overflow:hidden;
      cursor:pointer; text-decoration:none; color:inherit;
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border: 1px solid rgba(255,255,255,.08);
      display:flex; flex-direction:column; justify-content:flex-end;
      min-height:360px;
      transition: transform .45s cubic-bezier(0.22,1,0.36,1),
                  box-shadow .45s ease, border-color .45s ease;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.015);
      box-shadow: 0 32px 80px rgba(0,0,0,.7), 0 0 50px rgba(255,107,157,.2);
      border-color: rgba(255,107,157,.4);
    }

    /* shimmer on hover */
    .card::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: linear-gradient(110deg,transparent 40%,rgba(255,255,255,.07) 50%,transparent 60%);
    }
    .card:hover::after { animation: shimmer 1s ease forwards; }
    @keyframes shimmer {
      from { transform: translateX(-120%); }
      to   { transform: translateX(220%); }
    }

    /* ── GALLERY CARD ── */
    .card-gallery { background: rgba(5,0,15,.5); }

    /* image mosaic */
    .mosaic {
      position:absolute; inset:0;
      display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr);
      gap:2px; opacity:.45;
      transition: opacity .45s ease;
    }
    .card-gallery:hover .mosaic { opacity:.65; }

    .mosaic-cell {
      overflow:hidden; background:#111;
    }
    .mosaic-cell img {
      width:100%; height:100%; object-fit:cover;
      transform: scale(1.08);
      transition: transform 8s ease;
      animation: slowZoom 8s ease-in-out infinite alternate;
    }
    @keyframes slowZoom {
      from { transform: scale(1.08); }
      to   { transform: scale(1.18); }
    }

    /* gradient overlay */
    .card-overlay {
      position:absolute; inset:0; pointer-events:none;
      background: linear-gradient(to top,
        rgba(8,0,16,.96) 0%,
        rgba(8,0,16,.6)  45%,
        rgba(8,0,16,.1)  100%);
    }

    /* ── BADGE ── */
    .badge {
      position:absolute; top:18px; right:18px; z-index:3;
      font-size:9px; letter-spacing:3px; text-transform:uppercase;
      color:#fff; font-weight:600;
      background: linear-gradient(135deg, var(--pink), #a855f7);
      padding:5px 13px; border-radius:20px;
      box-shadow: 0 0 20px rgba(255,107,157,.5);
    }

    /* ── CARD CONTENT ── */
    .card-content {
      position:relative; z-index:2;
      padding:26px 28px 30px;
    }
    .card-tag {
      display:inline-block; font-size:10px; letter-spacing:4px;
      text-transform:uppercase; color:var(--pink2);
      border:1px solid rgba(255,133,192,.3); padding:3px 11px;
      border-radius:20px; margin-bottom:13px;
      background:rgba(255,107,157,.08);
    }
    .card-title {
      font-size: clamp(1.6rem,3.2vw,2.6rem);
      font-weight:200; letter-spacing:.04em; line-height:1.1;
      margin-bottom:10px;
    }
    .card-desc {
      font-size:13px; color:rgba(255,255,255,.45);
      line-height:1.7; margin-bottom:22px;
    }
    .card-cta {
      display:flex; align-items:center; gap:8px;
      font-size:11px; letter-spacing:3px; text-transform:uppercase;
      color:var(--pink2);
      transition: gap .3s ease, color .3s ease;
    }
    .card:hover .card-cta { gap:14px; color:#fff; }
    .card-cta svg { width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2; }

    /* ── OFFICIAL CARD ── */
    .card-official {
      background: linear-gradient(160deg,rgba(20,10,50,.8),rgba(8,0,16,.9));
      min-height:360px;
    }
    .official-orb {
      font-size:60px; margin-bottom:18px; display:block;
      animation: orbFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 0 18px var(--purple));
    }
    @keyframes orbFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    /* ── FOOTER ── */
    .footer {
      font-size:11px; color:rgba(255,255,255,.18); letter-spacing:2px;
      opacity:0;
    }
    #main.visible .footer {
      animation: fadeSlideUp .8s ease 1.1s forwards;
    }

    /* =========================================
       RESPONSIVE
    ========================================= */
    @media (max-width:620px) {
      .cards { grid-template-columns:1fr; max-width:420px; }
      .card, .card-official { min-height:220px; }
    }
  </style>
</head>
<body>

<!-- ===== PARTICLE CANVAS ===== -->
<canvas id="bg-canvas"></canvas>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<!-- ===== INTRO SCREEN ===== -->
<div id="intro">
  <div class="intro-ring">
    <!-- outer ring -->
    <svg viewBox="0 0 120 120" width="120" height="120">
      <circle cx="60" cy="60" r="54" fill="none"
        stroke="url(#rg1)" stroke-width="2"
        stroke-dasharray="180 160" stroke-linecap="round"/>
      <defs>
        <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff6b9d"/>
          <stop offset="100%" stop-color="#c8a8ff"/>
        </linearGradient>
      </defs>
    </svg>
    <!-- inner ring -->
    <svg class="rev" viewBox="0 0 120 120" width="120" height="120">
      <circle cx="60" cy="60" r="42" fill="none"
        stroke="url(#rg2)" stroke-width="1.5"
        stroke-dasharray="100 164" stroke-linecap="round"/>
      <defs>
        <linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f0c860"/>
          <stop offset="100%" stop-color="#ff6b9d"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="intro-logo">✿</div>
  </div>

  <div class="intro-title">范の导航页</div>
  <div class="intro-sub">二次元 · 精选图库 · 动漫美图</div>

  <div class="intro-bar-wrap">
    <div class="intro-bar" id="intro-bar"></div>
  </div>
  <div class="intro-pct" id="intro-pct">0%</div>
</div>

<!-- ===== MAIN PAGE ===== -->
<div id="main">
  <div class="header">
    <p class="eyebrow">欢迎来到范の小站</p>
    <h1>范の导航页</h1>
    <div class="header-line"></div>
  </div>

  <div class="cards">

    <!-- GALLERY CARD (main) -->
    <a class="card card-gallery" href="#gallery" id="gallery-card">
      <div class="mosaic" id="mosaic"></div>
      <div class="card-overlay"></div>
      <span class="badge">精选推荐</span>
      <div class="card-content">
        <span class="card-tag">Photo Gallery</span>
        <h2 class="card-title">精选图库</h2>
        <p class="card-desc">精心收录的二次元动漫角色图集，光与色的极致呈现。</p>
        <div class="card-cta">
          <span>进入图库</span>
          <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </div>
      </div>
    </a>

    <!-- OFFICIAL CARD -->
    <a class="card card-official" href="https://fannet.asia" target="_blank" rel="noopener" id="official-card">
      <div class="card-overlay" style="background:linear-gradient(to top,rgba(8,0,16,.99) 0%,rgba(8,0,16,.5) 55%,transparent 100%)"></div>
      <div class="card-content" style="text-align:center;align-items:center;display:flex;flex-direction:column;">
        <span class="official-orb">⬡</span>
        <span class="card-tag">Official Site</span>
        <h2 class="card-title" style="font-size:clamp(1.3rem,2.5vw,2rem);">官网</h2>
        <p class="card-desc">探索我们的品牌故事与服务。</p>
        <div class="card-cta" style="justify-content:center;">
          <span>访问官网</span>
          <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </div>
      </div>
    </a>

  </div>

  <div class="footer">© 2026 范の小站 · fannet.asia · All rights reserved</div>
</div>

<script>
/* =========================================
   IMAGE DATA
========================================= */
const THUMBS = [
  'https://i.imgs.ovh/2026/03/26/OHPB6p.th.png',
  'https://i.imgs.ovh/2026/03/26/OHPxcc.th.jpeg',
  'https://i.imgs.ovh/2026/03/26/OHPXl6.th.jpeg',
  'https://i.imgs.ovh/2026/03/26/OHP1CO.th.png',
  'https://i.imgs.ovh/2026/03/26/OHPNJg.th.png',
  'https://i.imgs.ovh/2026/03/26/OHPi10.th.png',
  'https://i.imgs.ovh/2026/03/26/OHQ7LY.th.png',
  'https://i.imgs.ovh/2026/03/26/OHQCPb.th.png',
  'https://i.imgs.ovh/2026/03/26/OHQZcn.th.jpeg',
  'https://i.imgs.ovh/2026/03/26/OHQa8L.th.png',
  'https://i.imgs.ovh/2026/03/26/OHQjlx.th.jpeg',
  'https://i.imgs.ovh/2026/03/26/OHQfCM.th.png',
  'https://i.imgs.ovh/2026/03/26/OHQrRr.th.jpeg',
  'https://i.imgs.ovh/2026/03/26/OHQvJh.th.jpeg',
  'https://i.imgs.ovh/2026/03/26/OHQF1e.th.png',
  'https://i.imgs.ovh/2026/03/26/OHQLTa.th.jpeg',
  'https://i.imgs.ovh/2026/03/26/OHQTPt.th.png',
  'https://i.imgs.ovh/2026/03/26/OHQbfC.th.png',
  'https://i.imgs.ovh/2026/03/26/OHQz84.th.png',
  'https://i.imgs.ovh/2026/03/26/OHQAtA.th.jpeg',
];

/* =========================================
   BUILD MOSAIC (6 cells, rotate images)
========================================= */
const mosaic = document.getElementById('mosaic');
const CELLS = 6;
// pick 6 spread across the 20
const picks = [0,3,7,11,15,18];
const cells = [];
picks.forEach(i => {
  const div = document.createElement('div');
  div.className = 'mosaic-cell';
  const img = document.createElement('img');
  img.src = THUMBS[i];
  img.loading = 'lazy';
  div.appendChild(img);
  mosaic.appendChild(div);
  cells.push({ el: div, img, cur: i });
});

// cycle images every 3s, staggered per cell
cells.forEach((cell, ci) => {
  let idx = picks[ci];
  setInterval(() => {
    idx = (idx + CELLS) % THUMBS.length;
    const next = document.createElement('img');
    next.src = THUMBS[idx];
    next.style.cssText = 'width:100%;height:100%;object-fit:cover;transform:scale(1.08);opacity:0;position:absolute;inset:0;transition:opacity 1s ease;';
    cell.el.style.position = 'relative';
    cell.el.appendChild(next);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { next.style.opacity = '1'; });
    });
    setTimeout(() => {
      if (cell.img.parentNode === cell.el) cell.el.removeChild(cell.img);
      cell.img = next;
      next.style.position = '';
      next.style.inset = '';
      next.style.transition = '';
      next.style.cssText = 'width:100%;height:100%;object-fit:cover;transform:scale(1.08);animation:slowZoom 8s ease-in-out infinite alternate;';
    }, 1100);
  }, 3000 + ci * 500);
});

/* =========================================
   INTRO PROGRESS + TRANSITION
========================================= */
const bar  = document.getElementById('intro-bar');
const pct  = document.getElementById('intro-pct');
const intro = document.getElementById('intro');
const main  = document.getElementById('main');
let progress = 0;

const iv = setInterval(() => {
  // accelerate toward 90 quickly, then slow
  const step = progress < 70 ? 3 : progress < 90 ? 1.2 : 0.3;
  progress = Math.min(progress + step, 100);
  bar.style.width = progress + '%';
  pct.textContent = Math.floor(progress) + '%';
  if (progress >= 100) {
    clearInterval(iv);
    setTimeout(launchMain, 300);
  }
}, 40);

function launchMain() {
  intro.classList.add('done');
  main.classList.add('visible');
  setTimeout(() => { intro.style.display = 'none'; }, 1300);
}

/* =========================================
   PARTICLE SYSTEM
========================================= */
(function() {
  const cv = document.getElementById('bg-canvas');
  const cx = cv.getContext('2d');
  let W, H;
  const COLORS = [
    [255,107,157],  // pink
    [200,168,255],  // purple
    [240,200,96],   // gold
    [255,255,255],  // white
  ];

  function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
  addEventListener('resize', resize); resize();

  const pts = Array.from({length:110}, () => mkPt());

  function rand(a,b) { return a + Math.random()*(b-a); }
  function mkPt() {
    const [r,g,b] = COLORS[Math.floor(Math.random()*COLORS.length)];
    return {
      x: rand(0,W||innerWidth), y: rand(0,H||innerHeight),
      r: rand(0.3,1.6), vx: rand(-.15,.15), vy: rand(-.28,-.05),
      a: rand(.1,.7), da: rand(.001,.0025), r_: r, g_: g, b_: b
    };
  }

  function loop() {
    cx.clearRect(0,0,W,H);
    for (const p of pts) {
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      cx.fillStyle = `rgba(${p.r_},${p.g_},${p.b_},${p.a})`;
      cx.fill();
      p.x += p.vx; p.y += p.vy; p.a -= p.da;
      if (p.a <= 0 || p.y < -10) Object.assign(p, mkPt(), {y: H+5, a: rand(.1,.45)});
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

/* =========================================
   3D PARALLAX ON CARDS
========================================= */
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('mousemove', e => {
    const rc = card.getBoundingClientRect();
    const dx = (e.clientX - rc.left - rc.width/2)  / rc.width;
    const dy = (e.clientY - rc.top  - rc.height/2) / rc.height;
    card.style.transform = `translateY(-8px) scale(1.015) rotateX(${-dy*5}deg) rotateY(${dx*6}deg)`;
  });
  card.addEventListener('mouseleave', () => { card.style.transform = ''; });
});

/* =========================================
   TAB TITLE SWITCH
========================================= */
(function() {
  const ACTIVE = '主人你好~欢迎访问范の导航页';
  const AWAY = [
    '不要离开我嘛 (´。＿。｀)',
    '喵呜...主人去哪了？',
    '人家等不住啦 >///<',
    '快回来嘛！QAQ',
    '主人是不是不要人家了...',
    '( ´•︵•` ) 好寂寞...',
    '呜呜，主人快回来！',
  ];
  let awayTimer = null;
  let awayIdx = 0;

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      awayIdx = 0;
      document.title = AWAY[awayIdx];
      awayTimer = setInterval(() => {
        awayIdx = (awayIdx + 1) % AWAY.length;
        document.title = AWAY[awayIdx];
      }, 2500);
    } else {
      clearInterval(awayTimer);
      document.title = ACTIVE;
    }
  });
})();
</script>
</body>
</html>
